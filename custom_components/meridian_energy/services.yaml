refresh_rates:
  name: Refresh rates
  description: >-
    Force an immediate refresh of electricity rates and TOU schedule
    from the provider's API, bypassing the 24-hour cache.

backfill:
  name: Backfill statistics
  description: >-
    Re-fetch and re-publish energy statistics from a specific date.
    Use this to fill gaps (e.g. after a long outage) or to pick up
    data that became available after initial processing.
  fields:
    start_date:
      name: Start date
      description: The date to start backfilling from (YYYY-MM-DD).
      required: true
      example: "2026-04-01"
      selector:
        date:
    end_date:
      name: End date
      description: >-
        The end date for the backfill range (YYYY-MM-DD).
        Defaults to today if not specified. The fetch always
        extends to now to keep cumulative sums consistent.
      required: false
      example: "2026-04-10"
      selector:
        date:
